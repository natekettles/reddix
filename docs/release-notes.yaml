release:
  - version: "0.2.10"
    title: "What's new in v0.2.10"
    banner: "Cookie auth for personal Reddit sessions."
    summary: "This fork can use your browser Reddit cookies when OAuth app approval is unavailable or delayed."
    url: "https://github.com/natekettles/reddix/releases/tag/v0.2.10"
    details:
      - "Set TOKEN_V2 and optional REDDIT_SESSION to use cookie auth instead of OAuth."
      - "Run cargo run --example cookie_probe to check credentials before opening the TUI."
      - "Apple Terminal now disables Kitty image escapes automatically."
  - version: "0.2.9"
    title: "What's new in v0.2.9"
    banner: "Windows previews now scale correctly."
    summary: "We ship sensible cell metrics defaults and optional overrides so inline media looks right everywhere."
    url: "https://github.com/ck-zhang/reddix/releases/tag/v0.2.9"
    details:
      - "Windows terminals now fall back to 8x16 cell metrics when crossterm can't report pixel dimensions."
      - "New ui.cell_width and ui.cell_height config entries let you pin custom metrics if your terminal needs them."
  - version: "0.2.8"
    title: "What's new in v0.2.8"
    banner: "Browse Reddit galleries without leaving the terminal."
    summary: "Cycle through gallery posts inline with kitty previews and quick keyboard shortcuts."
    url: "https://github.com/ck-zhang/reddix/releases/tag/v0.2.8"
    details:
      - "Gallery posts now render inline; press , or . to jump between images."
      - "Action menu includes next/previous gallery entries for keyboard navigation."
      - "Gallery images surface in the links menu for one-tap opening in your browser."
  - version: "0.2.7"
    title: "What's new in v0.2.7"
    banner: "Default theme now matches your terminal colors."
    summary: "Reddix now follows your terminal palette automatically when ui.theme is set to default. More theme presets are planned for a future update."
    url: "https://github.com/ck-zhang/reddix/releases/tag/v0.2.7"
    details:
      - "`ui.theme = default` now follows terminal colors automatically."
      - "Custom theme names aren't supported yet, but they're on the roadmap. For now everything falls back to your terminal colors."
  - version: "0.2.6"
    title: "What's new in v0.2.6"
    banner: "Esc exits fullscreen previews without quitting Reddix."
    summary: "Keep the session running: press Esc to drop out of fullscreen and stay in the feed."
    url: "https://github.com/ck-zhang/reddix/releases/tag/v0.2.6"
    details:
      - "Esc now closes the fullscreen media preview instead of terminating the application."
  - version: "0.2.5"
    title: "What's new in v0.2.5"
    banner: "Comments arrive! Reauthorize Reddit to grant the new submit scope."
    summary: "Press Enter to review what changed and how to enable comment posting."
    url: "https://github.com/ck-zhang/reddix/releases/tag/v0.2.5"
    details:
      - "Reply from the terminal: highlight a comment or the \"Comment thread\" entry and press w."
      - "Existing installs must reauthorize Reddit access via the guided menu so the submit scope is granted."
      - "If submissions fail, open the guided menu (m) and walk through Add new account to refresh credentials."
